# Production stack — React Shop
# Usage: cp .env.example .env && docker compose up -d --build

name: react-shop

services:
  db:
    image: postgres:16-alpine
    container_name: react-shop-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-react_shop}
      POSTGRES_USER: ${POSTGRES_USER:-react_shop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-react_shop_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - react-shop-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-react_shop} -d ${POSTGRES_DB:-react_shop}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: react-shop-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${POSTGRES_DB:-react_shop}
      DB_USER: ${POSTGRES_USER:-react_shop}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-react_shop_secret}
      DB_HOST: db
      DB_PORT: "5432"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,nginx}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      DEBUG: "False"
    volumes:
      - media_data:/app/uploads
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - react-shop-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/home/')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_USE_API: ${VITE_USE_API:-true}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    container_name: react-shop-frontend
    restart: unless-stopped
    networks:
      - react-shop-net

  nginx:
    image: nginx:1.27-alpine
    container_name: react-shop-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - react-shop-net

networks:
  react-shop-net:
    driver: bridge
    name: react-shop-net

volumes:
  postgres_data:
  media_data:
  static_data:
