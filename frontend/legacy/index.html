<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Showcase Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50:'#EEF2FF',100:'#E0E7FF',200:'#C7D2FE',300:'#A5B4FC',400:'#818CF8',500:'#6366F1',600:'#4F46E5',700:'#4338CA',800:'#3730A3',900:'#312E81' },
                        accent: { 50:'#ECFDF5',100:'#D1FAE5',200:'#A7F3D0',300:'#6EE7B7',400:'#34D399',500:'#10B981',600:'#059669',700:'#047857' },
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased">
    <!-- App Root -->
    <div id="app">
        <!-- Cart Sidebar Overlay -->
        <div id="cart-overlay" class="fixed inset-0 bg-black/40 z-50 hidden transition-opacity duration-300 opacity-0" onclick="CartHook.toggle()"></div>
        <!-- Cart Sidebar -->
        <aside id="cart-sidebar" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-50 shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
            <div class="flex items-center justify-between p-6 border-b">
                <h2 class="text-xl font-bold">Shopping Cart</h2>
                <button onclick="CartHook.toggle()" class="p-2 hover:bg-gray-100 rounded-lg transition"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-6"></div>
            <div id="cart-footer" class="border-t p-6"></div>
        </aside>

        <!-- Mobile Menu Overlay -->
        <div id="mobile-menu-overlay" class="fixed inset-0 bg-black/40 z-40 hidden transition-opacity duration-300 opacity-0" onclick="LayoutComponent.toggleMobileMenu()"></div>
        <aside id="mobile-menu" class="fixed top-0 left-0 h-full w-80 bg-white z-40 shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out">
            <div class="flex items-center justify-between p-6 border-b">
                <span class="text-xl font-bold text-primary-600">🛍️ ShopHub</span>
                <button onclick="LayoutComponent.toggleMobileMenu()" class="p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <nav id="mobile-nav" class="p-4"></nav>
        </aside>

        <!-- Header -->
        <header id="app-header" class="sticky top-0 z-30 bg-white/80 backdrop-blur-lg border-b border-gray-100"></header>

        <!-- Main Content -->
        <main id="app-content" class="min-h-screen"></main>

        <!-- Footer -->
        <footer id="app-footer"></footer>

        <!-- Toast Container -->
        <div id="toast-container" class="fixed bottom-6 right-6 z-[60] flex flex-col gap-2"></div>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/hooks.js"></script>
    <script src="js/components.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/app.js"></script>
<script src="https://deepsite.hf.co/deepsite-badge.js"></script>
</body>
</html>
